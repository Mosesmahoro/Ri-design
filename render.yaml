services:
  - type: static
    name: ri-creative-hub
    env: static
    branch: main
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      # Example: add API keys or other secrets here. For secrets, consider adding them in the Render dashboard instead of committing.
      # - key: MY_API_KEY
      #   value: "your-api-key-here"
    redirects:
      - type: rewrite
        source: "/(.*)"
        destination: "/index.html"